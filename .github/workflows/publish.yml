# Publish to npm

# Publishes @mcflamingo/bmf-node (Rust), @mcflamingo/bmf-sdk, @mcflamingo/bmf-cli,
# and @mcflamingo/bmf-gateway when a version tag like v0.2.0 is pushed.
#
# Rust is required: kin.* verification is NOT reimplemented in TypeScript.
#
# Auth: needs secrets.NPM_TOKEN (npm Automation token with publish on @mcflamingo).
# Do NOT set NODE_AUTH_TOKEN per-step to an empty secret — that clears setup-node auth.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@mcflamingo"
          package-manager-cache: false

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN_SECRET: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          TOKEN="${NPM_TOKEN:-$NODE_AUTH_TOKEN_SECRET}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Missing npm publish token. Set repository secret NPM_TOKEN to an npm Automation token with publish rights for @mcflamingo, then re-run this workflow."
            exit 1
          fi
          # Persist for subsequent steps (publish reads NODE_AUTH_TOKEN).
          echo "NODE_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          # setup-node routes npm through NPM_CONFIG_USERCONFIG — write there.
          CFG="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          cat > "$CFG" <<EOF
          //registry.npmjs.org/:_authToken=${TOKEN}
          @mcflamingo:registry=https://registry.npmjs.org/
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          echo "npm whoami:"
          npm whoami

      - name: Install JS workspaces
        run: npm ci

      - name: Build Rust bmf-node (+ workspaces)
        run: npm run build

      - name: Test (Rust + JS)
        run: npm test

      # Idempotent: re-running a tag (e.g. v0.2.1) must not fail with E403 when
      # that version is already on the registry from the first successful publish.
      - name: Publish packages (skip if version already on npm)
        run: |
          set -euo pipefail
          publish_one() {
            local workspace="$1"
            local name version
            name="$(node -p "require('./${workspace}/package.json').name")"
            version="$(node -p "require('./${workspace}/package.json').version")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "skip ${name}@${version} — already on npm"
              return 0
            fi
            echo "publish ${name}@${version}"
            npm publish --workspace "${workspace}" --no-provenance --access public
          }
          publish_one core-rs/bmf-node
          publish_one sdk/typescript
          publish_one cli
          publish_one gateway
