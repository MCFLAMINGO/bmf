name: Publish to npm

# Publishes @mcflamingo/bmf-sdk, @mcflamingo/bmf-cli, and @mcflamingo/bmf-gateway
# to npm using an NPM_TOKEN with Bypass-2FA enabled (bootstrap path — the packages
# don't exist yet, so trusted publishing can't be configured until after v0.1.0
# lands). Once all three are on npm, configure trusted publishing per package,
# revoke NPM_TOKEN, and switch this workflow back to OIDC (see the trusted-
# publishing block commented at the bottom of this file).
#
# Trigger: pushing a version tag like v0.1.0 or v1.2.3.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Write .npmrc with auth token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > ~/.npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          @mcflamingo:registry=https://registry.npmjs.org/
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          echo "whoami check:"
          npm whoami || echo "whoami failed (may still publish OK)"

      - name: Install
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Test all workspaces
        run: npm test

      # Order matters: cli and gateway depend on the sdk.
      # --no-provenance because provenance requires OIDC trusted publishing,
      # which requires the package to already exist on npm. Chicken-and-egg.
      - name: Publish sdk
        run: npm publish --workspace sdk/typescript --no-provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli
        run: npm publish --workspace cli --no-provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gateway
        run: npm publish --workspace gateway --no-provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# --- Trusted publishing block (uncomment after first successful publish) ---
